<!DOCTYPE html>
<html lang="de">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Webapplikation für Lager Management">
        <meta name="keywords" content="HTML, CSS, Javascript">
        <meta name="author" content="Nicolas_Weber">
        <title>MK Lager</title>
        <link rel="stylesheet" href="styles/style.css">
    </head>
    <main>
        <div class="banner">
            <p style="width: 75%;">
                MK<span style="font-size: 0.4em;vertical-align:text-top;">&reg;</span> Lager
            </p>
        </div>

        <footer>
            <p>Copyright 2026</p>
        </footer>

        <div style="display: none;" class="login">
            <form class="login_form">
                <div class="element_Input">
                    <label for="email" name="Email">
                        Email
                    </label>
                    <input class="input_field" type="text" id="email" name="email">
                </div>
                <div class="element_Input">
                    <label for="passwort" name="Passwort">
                        Passwort
                    </label>
                    <input class="input_field" type="text" id="password" name="password">
                </div>
                <div class="element_Input checkbox">
                    <input class="checkbox_inner" type="checkbox" id="remember" name="remember">
                    <label for="remember" name="remember me?"> remember me?</label>
                </div>
                <div class="buttons">
                    <button class="input_button primary">Login</button>
                    <button class="input_button secondary">Reset</button>
                </div>
                <div>
                    <p class="error_msg">
                        *Email oder Passwort ist falsch*
                    </p>
                </div>
            </form>
        </div>
        <div class="home">
            <div class="home_buttons">
                <div class="buttons">
                    <button class="input_button" id="currentmonth"></button>
                    <button class="input_button" id="nextmonth"></button>
                    <button class="input_button" id="next2month"></button>
                    <button class="input_button">Spezifisch Suchen</button>
                    <script src="scripts/months.js"></script>
                </div>
            </div>
        </div>
    </main>
</html>
